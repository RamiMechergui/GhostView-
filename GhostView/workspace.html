<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0f0f1a 0%,#16163a 40%,#0a1a30 100%);color:#e2e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{width:680px;max-width:94vw;max-height:90vh;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.greet h2{font-size:22px;font-weight:300;color:#e2e8f0}
.greet span{font-size:12px;color:#718096}
.greet .nm{color:#63b3ed;font-weight:500}
.action{display:flex;gap:10px}
#lgo{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);color:#8899aa;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
#lgo:hover{background:rgba(229,62,62,0.12);border-color:rgba(229,62,62,0.2);color:#fc8181}
#nw{background:linear-gradient(135deg,#4299e1,#2b6cb0);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;box-shadow:0 2px 8px rgba(66,153,225,0.15)}
#nw:hover{box-shadow:0 4px 14px rgba(66,153,225,0.25);transform:translateY(-1px)}
#gl{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:14px;min-height:0;padding:2px}
#gl::-webkit-scrollbar{width:3px}
#gl::-webkit-scrollbar-thumb{background:rgba(66,153,225,0.2);border-radius:2px}
.wc{background:rgba(16,20,40,0.8);border:1px solid rgba(15,52,96,0.35);border-radius:14px;padding:24px;cursor:pointer;transition:all .25s;position:relative;backdrop-filter:blur(8px)}
.wc:hover{border-color:rgba(66,153,225,0.3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.25)}
.wc .wi{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.wc .wiv{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(66,153,225,0.12),rgba(128,90,213,0.12));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all .2s}
.wc:hover .wiv{transform:scale(1.05);background:linear-gradient(135deg,rgba(66,153,225,0.2),rgba(128,90,213,0.2))}
.wc .wn{font-size:16px;font-weight:500;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc .wm{font-size:11px;color:#5a6a7a;margin-left:auto;white-space:nowrap;flex-shrink:0}
.wc .ws{display:flex;gap:14px;font-size:11px;color:#718096}
.wc .ws span{display:flex;align-items:center;gap:4px}
.wc .ws .dot{width:5px;height:5px;border-radius:50%;background:#48bb78;display:inline-block}
.wc .wdel{position:absolute;top:12px;right:14px;background:none;border:none;color:#3a4a5a;cursor:pointer;font-size:14px;opacity:0;transition:all .2s;line-height:1}
.wc:hover .wdel{opacity:0.5}
.wc .wdel:hover{opacity:1;color:#fc8181}
.he{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#4a5568;gap:8px;grid-column:1/-1}
.he .bi{font-size:40px;opacity:0.3}
.he .bt{font-size:14px;color:#718096}
.act{display:flex;align-items:center;gap:6px;color:#63b3ed;font-size:12px;margin-top:12px;font-weight:450;opacity:0;transition:all .2s}
.wc:hover .act{opacity:1}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal.open{display:flex}
.mbox{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(15,52,96,0.5);border-radius:14px;padding:28px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.mbox h3{font-size:16px;font-weight:500;margin-bottom:4px}
.mbox p{font-size:11px;color:#718096;margin-bottom:16px}
.mbox input{width:100%;padding:10px 14px;background:rgba(10,41,80,0.6);border:1px solid rgba(26,54,93,0.5);border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;margin-bottom:14px;transition:border-color .2s}
.mbox input:focus{border-color:rgba(66,153,225,0.4)}
.mbox .merr{font-size:11px;color:#fc8181;margin-bottom:10px;min-height:16px}
.mb{display:flex;gap:10px}
.mb button{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;transition:all .2s}
.mb .mp{background:linear-gradient(135deg,#4299e1,#2b6cb0);color:#fff;box-shadow:0 2px 8px rgba(66,153,225,0.15)}
.mb .mp:hover{box-shadow:0 4px 14px rgba(66,153,225,0.25)}
.mb .ms{background:rgba(255,255,255,0.06);color:#8899aa}
.mb .ms:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="greet">
      <h2>Welcome back, <span class="nm" id="uname">—</span></h2>
      <span>Choose a workspace to continue browsing</span>
    </div>
    <div class="action">
      <button id="lgo">&#10140; Logout</button>
      <button id="nw">+ New Workspace</button>
    </div>
  </div>
  <div id="gl"></div>
</div>

<div class="modal" id="nm">
  <div class="mbox">
    <h3>Create Workspace</h3>
    <p>Give your workspace a name to get started</p>
    <input type="text" id="wni" placeholder="e.g. Work, Studies, Video Editing" maxlength="30" autofocus>
    <div class="merr" id="wmerr"></div>
    <div class="mb">
      <button class="ms" id="wmc">Cancel</button>
      <button class="mp" id="wmok">Create</button>
    </div>
  </div>
</div>

<script>
const g = window.ghost;
const gl = document.getElementById('gl');
const uname = document.getElementById('uname');
const nw = document.getElementById('nw');
const lgo = document.getElementById('lgo');
const nm = document.getElementById('nm');
const wni = document.getElementById('wni');
const wmerr = document.getElementById('wmerr');
const wmc = document.getElementById('wmc');
const wmok = document.getElementById('wmok');

const icons = ['\uD83D\uDCBB', '\uD83D\uDCDA', '\uD83C\uDFAC', '\uD83C\uDFAE', '\uD83C\uDFB5', '\uD83D\uDDA5\uFE0F', '\uD83D\uDCF7', '\u2708\uFE0F', '\uD83D\uDCC8', '\uD83D\uDD0C', '\uD83C\uDFA8', '\u2699\uFE0F', '\uD83D\uDCDD', '\uD83D\uDCF1', '\uD83D\uDCD6', '\uD83C\uDF10'];

function randIcon() { return icons[Math.floor(Math.random() * icons.length)]; }

async function load() {
  const u = await g.getUser();
  uname.textContent = u ? u.pseudo : '—';
  const ws = await g.getWorkspaces();
  render(ws);
}

function render(ws) {
  gl.innerHTML = '';
  if (!ws || ws.length === 0) {
    gl.innerHTML = '<div class="he"><div class="bi">\uD83D\uDCBB</div><div class="bt">No workspaces yet</div><div class="bs">Create one to start browsing</div></div>';
    return;
  }
  ws.forEach(w => {
    const el = document.createElement('div'); el.className = 'wc';
    const d = new Date(w.created);
    const dd = d.toLocaleDateString([], { month:'short', day:'numeric' });
    const ic = randIcon();
    el.innerHTML = '<button class="wdel" data-id="'+w.id+'">\u2715</button><div class="wi"><div class="wiv">'+ic+'</div><div class="wn">'+esc(w.name)+'</div><div class="wm">'+dd+'</div></div><div class="ws"><span><span class="dot"></span>'+w.tabCount+' tab'+(w.tabCount!==1?'s':'')+'</span></div><div class="act">\u2192 Open Workspace</div>';
    el.onclick = (e) => {
      if (e.target.closest('.wdel')) return;
      g.selectWorkspace(w.id);
    };
    gl.appendChild(el);
  });
  document.querySelectorAll('.wdel').forEach(b => {
    const id = b.dataset.id;
    b.onclick = async (e) => { e.stopPropagation(); await g.deleteWorkspace(id); load(); };
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

nw.onclick = () => { nm.classList.add('open'); wni.value = ''; wmerr.textContent = ''; wni.focus(); };
wmc.onclick = () => { nm.classList.remove('open'); };
wmok.onclick = async () => {
  const name = wni.value.trim();
  if (!name) { wmerr.textContent = 'Enter a workspace name.'; return; }
  if (name.length > 30) { wmerr.textContent = 'Max 30 characters.'; return; }
  const r = await g.createWorkspace(name);
  if (r.ok) { nm.classList.remove('open'); load(); }
  else { wmerr.textContent = r.error; }
};
wni.addEventListener('keydown', (e) => { if (e.key === 'Enter') wmok.click(); if (e.key === 'Escape') wmc.click(); });
lgo.onclick = async () => { await g.logout(); window.location.href = 'login.html'; };

g.clearMenu();
load();

['mousemove','mousedown','keydown','click','scroll','touchstart','wheel'].forEach(evt => {
  document.addEventListener(evt, () => g.resetIdleTimer(), { passive: true });
});
</script>
</body>
</html>
